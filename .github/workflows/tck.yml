# Based on https://github.com/wildfly-extras/a2a-jakarta/blob/main/.github/workflows/run-tck.yml

name: Build and Run TCK

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

env:
  # Ref (branch/tag/SHA) of the TCK
  # https://github.com/a2aproject/a2a-tck
  TCK_VERSION: 1.0.0.alpha1
  UV_SYSTEM_PYTHON: 1
  # Env vars to configure SUT hosts
  SUT_HOST: localhost:8080
  SUT_GRPC_HOST: localhost:9555

concurrency:
  group: '${{ github.workflow }} @ ${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Run TCK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - name: Check if SDK version is SNAPSHOT
        run: |
          SDK_VERSION=$(grep -oP '<version\.sdk>\K[^<]+' pom.xml)
          echo "Detected SDK_VERSION: ${SDK_VERSION}"
          echo "SDK_VERSION=${SDK_VERSION}" >> "$GITHUB_ENV"
          if [[ "${SDK_VERSION}" == *"-SNAPSHOT" ]]; then
            echo "IS_SNAPSHOT=true" >> "$GITHUB_ENV"
          else
            echo "IS_SNAPSHOT=false" >> "$GITHUB_ENV"
          fi
      - name: Checkout a2a-java
        if: env.IS_SNAPSHOT == 'true'
        uses: actions/checkout@v7
        with:
          repository: a2aproject/a2a-java
          path: a2a-java
      - name: Checkout a2a-tck
        uses: actions/checkout@v7
        with:
          repository: a2aproject/a2a-tck
          path: a2a-tck
          ref: ${{ env.TCK_VERSION }}
      - name: Build a2a-java with Maven, skipping tests
        if: env.IS_SNAPSHOT == 'true'
        run: |
          ./mvnw -B -ntp install -DskipTests
        working-directory: a2a-java
      - name: Get a2a-java version and save as env var
        if: env.IS_SNAPSHOT == 'true'
        run: |
          VERSION=$(./mvnw -B -ntp help:evaluate -Dexpression=project.version -q -DforceStdout 2>&1 | grep -v '\[')
          echo "Detected a2a-java version: ${VERSION}"
          echo "SDK_VERSION=${VERSION}" >> "$GITHUB_ENV"
        working-directory: a2a-java

      - name: Build the Feature pack and provision the TCK server
        run: ./mvnw -B -ntp install -Dversion.sdk=${SDK_VERSION}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "a2a-tck/pyproject.toml"
      - name: Install uv and Python dependencies
        run: |
          pip install uv
          uv pip install -e .
        working-directory: a2a-tck
      - name: Start the WildFly SUT
        run: |
          ./mvnw -B -ntp wildfly:start -Dversion.sdk=${SDK_VERSION} -pl tck -Dstartup-timeout=120 -Dwildfly.serverArgs="--stability=experimental"
      - name: Run TCK
        id: run-tck
        timeout-minutes: 5
        run: |
          set -o pipefail
          uv run ./run_tck.py --sut-host http://${{ env.SUT_HOST }} -v 2>&1 | tee tck-output.log
        working-directory: a2a-tck
      - name: TCK Summary
        if: always() && steps.run-tck.outcome != 'skipped'
        run: |
          if [ -f a2a-tck/tck-output.log ]; then
            SUMMARY=$(sed -n '/^═══/,$p' a2a-tck/tck-output.log)
            if [ -n "$SUMMARY" ]; then
              echo '### TCK Results' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi
      - name: Shutdown the WildFly SUT
        if: always()
        run: |
          ./mvnw -B -ntp wildfly:shutdown -pl tck
      - name: Upload TCK Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tck-reports
          path: a2a-tck/reports/
          retention-days: 14
          if-no-files-found: warn
      - name: Upload tck server.log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tck-server-log
          path: tck/target/wildfly/standalone/log/server.log
          retention-days: 5
